<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" width="200" height="220">
  <defs>

    <filter id="wGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="sparkGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="borderGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="shieldBorder" x1="0%" y1="0%" x2="100%" y2="120%">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="60%"  stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>

    <linearGradient id="wGrad" x1="10%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="35%"  stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <radialGradient id="innerGlow" cx="50%" cy="42%" r="44%">
      <stop offset="0%"   stop-color="#0ea5e9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>

    <path id="shield" d="M50,103 L7,73 L5,20 Q5,5 20,5 L80,5 Q95,5 95,20 L93,73 Z"/>

  </defs>

  <!-- Fondo escudo -->
  <use href="#shield" fill="#0b1220"/>
  <use href="#shield" fill="url(#innerGlow)"/>
  <use href="#shield" fill="none" stroke="url(#shieldBorder)" stroke-width="2.4" filter="url(#borderGlow)"/>

  <!-- ── W gruesa y agresiva ─────────────────────────────────────── -->
  <!-- Trazo principal: stroke-width 10.5 (antes 7.5) -->
  <path d="M20,26 L34,71 L50,46 L66,71 L80,26"
        stroke="url(#wGrad)"
        stroke-width="10.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        filter="url(#wGlow)"/>

  <!-- Núcleo blanco caliente más grueso: 3px (antes 2px) -->
  <path d="M20,26 L34,71 L50,46 L66,71 L80,26"
        stroke="#ffffff"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.8"/>

  <!-- Punto caliente central -->
  <circle cx="50" cy="46" r="4" fill="#00d4ff" filter="url(#sparkGlow)" opacity="0.95"/>
  <circle cx="50" cy="46" r="1.6" fill="#ffffff"/>

  <!-- ══ CHISPAS VALLE IZQUIERDO (34,71) ════════════════════════════ -->
  <!-- Ráfaga irregular: cortas, distintas longitudes y ángulos -->
  <!-- Largas -->
  <line x1="34" y1="71" x2="22" y2="82" stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round" filter="url(#sparkGlow)" opacity="0.95"/>
  <line x1="34" y1="71" x2="32" y2="85" stroke="#7dd3fc" stroke-width="1.3" stroke-linecap="round" filter="url(#sparkGlow)" opacity="0.85"/>
  <line x1="34" y1="71" x2="43" y2="83" stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round" filter="url(#sparkGlow)" opacity="0.9"/>
  <!-- Medias -->
  <line x1="34" y1="71" x2="25" y2="78" stroke="#ffffff"  stroke-width="1.0" stroke-linecap="round" opacity="0.65"/>
  <line x1="34" y1="71" x2="28" y2="80" stroke="#38bdf8" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <line x1="34" y1="71" x2="40" y2="79" stroke="#7dd3fc" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>
  <line x1="34" y1="71" x2="44" y2="76" stroke="#ffffff"  stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  <!-- Cortas / rebote -->
  <line x1="34" y1="71" x2="28" y2="74" stroke="#ffffff"  stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <line x1="34" y1="71" x2="37" y2="76" stroke="#38bdf8" stroke-width="0.6" stroke-linecap="round" opacity="0.45"/>
  <line x1="34" y1="71" x2="19" y2="78" stroke="#0ea5e9" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <!-- Partículas molten (puntitos al final de las chispas) -->
  <circle cx="22" cy="83" r="0.9" fill="#38bdf8" filter="url(#sparkGlow)" opacity="0.8"/>
  <circle cx="32" cy="87" r="0.7" fill="#ffffff"  opacity="0.65"/>
  <circle cx="44" cy="84" r="0.8" fill="#7dd3fc" opacity="0.7"/>
  <circle cx="18" cy="80" r="0.6" fill="#38bdf8" opacity="0.5"/>
  <circle cx="46" cy="78" r="0.5" fill="#ffffff"  opacity="0.45"/>

  <!-- ══ CHISPAS VALLE DERECHO (66,71) ══════════════════════════════ -->
  <!-- Largas -->
  <line x1="66" y1="71" x2="78" y2="82" stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round" filter="url(#sparkGlow)" opacity="0.95"/>
  <line x1="66" y1="71" x2="68" y2="85" stroke="#7dd3fc" stroke-width="1.3" stroke-linecap="round" filter="url(#sparkGlow)" opacity="0.85"/>
  <line x1="66" y1="71" x2="57" y2="83" stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round" filter="url(#sparkGlow)" opacity="0.9"/>
  <!-- Medias -->
  <line x1="66" y1="71" x2="75" y2="78" stroke="#ffffff"  stroke-width="1.0" stroke-linecap="round" opacity="0.65"/>
  <line x1="66" y1="71" x2="72" y2="80" stroke="#38bdf8" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <line x1="66" y1="71" x2="60" y2="79" stroke="#7dd3fc" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>
  <line x1="66" y1="71" x2="56" y2="76" stroke="#ffffff"  stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  <!-- Cortas -->
  <line x1="66" y1="71" x2="72" y2="74" stroke="#ffffff"  stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <line x1="66" y1="71" x2="63" y2="76" stroke="#38bdf8" stroke-width="0.6" stroke-linecap="round" opacity="0.45"/>
  <line x1="66" y1="71" x2="81" y2="78" stroke="#0ea5e9" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <!-- Partículas -->
  <circle cx="78" cy="83" r="0.9" fill="#38bdf8" filter="url(#sparkGlow)" opacity="0.8"/>
  <circle cx="68" cy="87" r="0.7" fill="#ffffff"  opacity="0.65"/>
  <circle cx="56" cy="84" r="0.8" fill="#7dd3fc" opacity="0.7"/>
  <circle cx="82" cy="80" r="0.6" fill="#38bdf8" opacity="0.5"/>
  <circle cx="54" cy="78" r="0.5" fill="#ffffff"  opacity="0.45"/>

  <!-- Partículas ambientales flotantes -->
  <circle cx="18" cy="38" r="0.8" fill="#38bdf8" opacity="0.45"/>
  <circle cx="80" cy="40" r="0.6" fill="#7dd3fc" opacity="0.4"/>
  <circle cx="50" cy="13" r="0.5" fill="#ffffff"  opacity="0.3"/>
  <circle cx="12" cy="56" r="0.7" fill="#0ea5e9"  opacity="0.35"/>
  <circle cx="87" cy="53" r="0.6" fill="#38bdf8"  opacity="0.3"/>

</svg>
